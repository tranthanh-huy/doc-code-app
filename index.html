<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Bản đồ đọc code</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <h1 id="projectName">Bản đồ đọc code</h1>
      <p id="projectMeta" class="muted"></p>
    </div>
    <div class="topbar__actions">
      <button id="btnImportUrl" class="btn btn--outline" type="button">Từ link…</button>
      <button id="btnImport" class="btn" type="button">Nhập file…</button>
      <input id="fileInput" type="file" accept="application/json,.json" hidden />
    </div>
  </header>

  <div class="projbar" id="projbar" hidden>
    <label class="projbar__lbl" for="projectPicker">Dự án:</label>
    <select id="projectPicker" class="select" aria-label="Chọn dự án"></select>
    <button id="btnRefresh" class="btn btn--outline btn--icon" type="button" title="Tải bản mới nhất từ link" aria-label="Làm mới">Làm mới</button>
    <button id="btnDeleteProject" class="btn btn--outline btn--icon" type="button" title="Xoá dự án này khỏi tủ" aria-label="Xoá khỏi tủ">Xoá</button>
  </div>

  <main id="app">
    <div id="emptyState" class="empty" hidden>
      <div class="empty__card" id="dropZone">
        <h2>Chưa có sơ đồ nào</h2>
        <p class="muted">Chọn file <code>sodo.json</code> (trong thư mục <code>.doc-code/</code> của dự án bạn đang học), hoặc kéo-thả file vào đây.</p>
        <button id="btnImport2" class="btn" type="button">Chọn file sodo.json</button>
      </div>
    </div>

    <div id="content" hidden>
      <section class="panel">
        <div class="panel__head">
          <h2>Sơ đồ kết nối</h2>
          <div class="zoombar">
            <button class="btn btn--outline btn--icon" id="zoomOut" type="button" aria-label="Thu nhỏ">−</button>
            <button class="btn btn--outline btn--icon" id="zoomReset" type="button" aria-label="Vừa màn hình">Vừa</button>
            <button class="btn btn--outline btn--icon" id="zoomIn" type="button" aria-label="Phóng to">+</button>
          </div>
        </div>
        <div class="mapwrap" id="mapWrap">
          <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="hint" id="mapHint"></div>
      </section>

      <section class="panel">
        <div class="panel__head"><h2>Chi tiết từng phần</h2></div>
        <div id="detail" class="detail"></div>
      </section>
    </div>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
